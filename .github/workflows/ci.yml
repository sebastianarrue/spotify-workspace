name: CI/CD Spotify Workspace

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [ submodule-updated ]

permissions:
  id-token: write # Requerido para autenticación OIDC
  contents: read  # Requerido para hacer checkout del código

jobs:
  # ========================================================
  # JOB 1: INTEGRACIÓN CONTINUA (CI) - Validación y Tests
  # ========================================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Actualizar submódulos al último commit
      run: |
        git submodule update --remote --recursive

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22 
        cache: 'npm'
        cache-dependency-path: |
          spotify-nodejs/package-lock.json
          spotify-angular/package-lock.json

    - name: Correr Tests del Backend (Node.js)
      run: |
        cd spotify-nodejs
        npm ci 
        npm test -- --passWithNoTests

    - name: Correr Tests del Frontend (Angular)
      run: |
        cd spotify-angular
        npm ci
        npm test -- --watch=false

    - name: Verificar herramientas de Docker
      run: |
        docker --version
        docker compose version

    # Esto probará que tanto el Dockerfile de Angular como el de Node compilan sin errores.
    - name: Construir imágenes de Docker
      run: docker compose build

  # ========================================================
  # JOB 2: DESPLIEGUE CONTINUO (CD) - Subida a AWS ECR
  # ========================================================
  deploy:
    name: Continuous Deployment to AWS ECR
    runs-on: ubuntu-latest
    needs: build-and-test # Respeto de pipeline: Solo corre si los tests pasan
    # Control de seguridad: No despliega en Pull Requests, solo en pushes a main o dispatches
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Actualizar submódulos al último commit
      run: |
        git submodule update --remote --recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Conexión segura a AWS mediante OIDC (Sin contraseñas fijas)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ vars.AWS_REGION }}
        audience: sts.amazonaws.com

    # Login oficial en AWS ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Construir y empujar la imagen del Backend (Node.js)
    - name: Build and Push Backend to ECR
      uses: docker/build-push-action@v5
      with:
        context: ./spotify-nodejs
        file: ./spotify-nodejs/Dockerfile
        push: true
        tags: |
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/spotify-backend:latest
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/spotify-backend:${{ github.sha }}

    # Construir y empujar la imagen del Frontend (Angular)
    - name: Build and Push Frontend to ECR
      uses: docker/build-push-action@v5
      with:
        context: ./spotify-angular
        file: ./spotify-angular/Dockerfile
        push: true
        tags: |
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/spotify-frontend:latest
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/spotify-frontend:${{ github.sha }}

  # ==========================================================
  # JOB 3: DESPLIEGUE CONTINUO FRONTEND(CD) - Subida a AWS S3
  # ==========================================================
  deploy-frontend:
    name: Continuous Deployment Frontend to S3
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Actualizar submódulos al último commit
      run: git submodule update --remote --recursive

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: spotify-angular/package-lock.json

    # Compilar Angular para producción (Genera la carpeta dist/)
    - name: Build Angular Project
      run: |
        cd spotify-angular
        npm ci
        npm run build -- --configuration=production

    # Autenticación segura con AWS vía OIDC
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ vars.AWS_REGION }}
        audience: sts.amazonaws.com

    # Sincronizar la carpeta dist directamente a S3 borrando lo viejo
    # NOTA: Ajusta 'dist/spotify-angular/browser' según la estructura que genere tu comando npm run build
    - name: Deploy static files to S3
      run: |
        aws s3 sync ./spotify-angular/dist/spotify-angular/browser s3://sebastian-spotify-frontend --delete